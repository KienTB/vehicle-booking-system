# =============================================
# PROD Profile - Production Environment
# =============================================

server.port=8080

# --- Database (Production MySQL) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- JWT ---
jwt.secret-key=${JWT_SECRET_KEY}
jwt.expiration=900000
jwt.refresh-expiration=604800000

# --- Logging (minimal for prod) ---
logging.level.root=WARN
logging.level.com.kien.vehicle.booking=INFO

# --- Swagger (disabled in prod) ---
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# --- Mail ---
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.folder=${CLOUDINARY_FOLDER:vehicle-booking/cars}

